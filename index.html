<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="לוח הטהרה" />
<title>לוח הטהרה שלי</title>
<link rel="icon" type="image/svg+xml" href="images/logo.svg"/>
<link rel="apple-touch-icon" href="images/logo.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Suez+One&family=David+Libre:wght@400;500;700&family=Amatic+SC:wght@400;700&display=swap" />
<link rel="stylesheet" href="css/design.css" />
<!-- Apply stored language before first paint to avoid direction flash -->
<script>
  (function(){
    var l=localStorage.getItem('tahara_lang_v1')||'he';
    document.documentElement.setAttribute('lang',l==='en'?'en':'he');
    document.documentElement.setAttribute('dir',l==='en'?'ltr':'rtl');
  })();
</script>
</head>
<body>
<div id="root"></div>

<!-- Firebase (ES module) -->
<script type="module" src="js/firebase.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- App modules (order matters — i18n first, then each builds on the previous) -->
<script type="text/babel" src="js/i18n.js"></script>
<script type="text/babel" src="js/logic.js"></script>
<script type="text/babel" src="js/calendar.js"></script>
<script type="text/babel" src="js/screens.js"></script>
<script type="text/babel" src="js/settings.js"></script>
<script type="text/babel" src="js/glossary.js"></script>
<script type="text/babel" src="js/onboarding.js"></script>
<script type="text/babel" src="js/auth.js"></script>
<script type="text/babel" src="js/app.js"></script>
</body>
</html>
